resources:
  limits:
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 256Mi

enableWindowsIpam: "true"

env:
  ENABLE_PREFIX_DELEGATION: "true"
  # WARM_PREFIX_TARGET: "1"
  WARM_IP_TARGET: "1"
  MINIMUM_IP_TARGET: "1"
