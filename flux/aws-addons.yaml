## FluxCD application for aws-addons.

apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: aws-addons
  namespace: flux-system
spec:
  dependsOn:
    - name: flux-system
  interval: 1m
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: /flux/aws-addons
  prune: true
  postBuild:
    substituteFrom:
      - kind: ConfigMap
        name: cluster-vars
