apiVersion: karpenter.k8s.aws/v1alpha1
kind: AWSNodeTemplate
metadata:
  name: windows2022
spec:
  subnetSelector:
    karpenter.sh/discovery: {{ .Values.cluster_name }}
  securityGroupSelector:
    karpenter.sh/discovery: {{ .Values.cluster_name }}
  amiFamily: Windows2022
  amiSelector:
    aws::owners: amazon
    ## $ aws --region eu-central-1 ec2 describe-images --owners amazon --filters "Name=name,Values=Windows_Server-2022-English-Core-EKS_Optimized-1.25-*" --query 'reverse(sort_by(Images, &Name))[0].Name' --output text | cat
    ami::name: Windows_Server-2022-English-Core-EKS_Optimized-1.25-2023.09.12
  tags:
    AmiName: Windows_Server-2022-English-Core-EKS_Optimized-1.25-2023.09.12
    Cluster: {{ .Values.cluster_name }}
    Name: {{ .Values.cluster_name }}-windows2022
    Nodegroup: windows2022
    karpenter.sh/discovery: {{ .Values.cluster_name }}
  metadataOptions:
    httpEndpoint: enabled
    httpProtocolIPv6: disabled
    httpPutResponseHopLimit: 2
    httpTokens: required
  blockDeviceMappings:
    - deviceName: /dev/sda1
      ebs:
        volumeSize: 50Gi
        volumeType: gp3
        # iops: 3000
        # throughput: 125
        encrypted: true
        kmsKeyID: "arn:aws:kms:{{ .Values.region }}:{{ .Values.account_id }}:alias/aws/ebs"
        deleteOnTermination: true
  detailedMonitoring: true
---
apiVersion: karpenter.sh/v1alpha5
kind: Provisioner
metadata:
  name: windows2022
spec:
  providerRef:
    name: windows2022
  labels:
    nodegroup: windows2022
    nodegroup/windows2022: "true"
  taints:
    - key: nodegroup/windows2022
      value: "true"
      effect: NoSchedule
  requirements:
    - key: karpenter.k8s.aws/instance-category
      operator: In
      values:
        - t
        - m
    - key: karpenter.sh/capacity-type
      operator: In
      values:
        - spot
        - on-demand
    - key: kubernetes.io/os
      operator: In
      values: 
        - windows
  ttlSecondsUntilExpired: 3600
  weight: 1
