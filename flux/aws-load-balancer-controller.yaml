## FluxCD application for aws-load-balancer-controller.
##
## Helm releases that installs Services calls its webhook so it must be
## installed before others.

apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: aws-load-balancer-controller
  namespace: flux-system
spec:
  dependsOn:
    - name: flux-system
  interval: 1m
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: /flux/aws-load-balancer-controller
  prune: true
  postBuild:
    substituteFrom:
      - kind: ConfigMap
        name: cluster-vars
