apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: aws-vpc-cni
  namespace: flux-system
spec:
  interval: 1m
  timeout: 5m
  maxHistory: 2
  releaseName: aws-vpc-cni
  targetNamespace: kube-system
  storageNamespace: kube-system
  serviceAccountName: helm-controller
  chart:
    spec:
      interval: 1m
      chart: aws-vpc-cni
      version: 1.15.1 ## $ curl -qsS https://aws.github.io/eks-charts/index.yaml | yq .entries.aws-vpc-cni.0.version
      sourceRef:
        kind: HelmRepository
        name: eks-charts
      reconcileStrategy: ChartVersion
  install:
    crds: CreateReplace
  upgrade:
    crds: CreateReplace
  values:
    ## https://github.com/aws/eks-charts/blob/master/stable/aws-vpc-cni/values.yaml

    env:
      ENABLE_PREFIX_DELEGATION: "true"
      # WARM_PREFIX_TARGET: "1"
      WARM_IP_TARGET: "1"
      MINIMUM_IP_TARGET: "1"
      # AWS_VPC_K8S_CNI_CUSTOM_NETWORK_CFG: "true"
      # ENI_CONFIG_LABEL_DEF: topology.kubernetes.io/zone

      AWS_VPC_K8S_CNI_LOGLEVEL: info
      AWS_VPC_K8S_CNI_LOG_FILE: stderr
      AWS_VPC_K8S_PLUGIN_LOG_LEVEL: info
      AWS_VPC_K8S_PLUGIN_LOG_FILE: stderr

    enableWindowsIpam: "false"

    serviceAccount:
      annotations:
        eks.amazonaws.com/role-arn: arn:aws:iam::${account_id}:role/${cluster_name}-irsa-aws-vpc-cni

    livenessProbeTimeoutSeconds: 20

    resources:
      limits:
        memory: 128Mi
      requests:
        cpu: 100m
        memory: 128Mi

    updateStrategy:
      type: RollingUpdate
      rollingUpdate:
        maxUnavailable: "25%"

    nodeSelector: {}
