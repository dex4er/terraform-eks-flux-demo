## Kubernetes AddOn for AWS VPC CNI

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - https://raw.githubusercontent.com/aws/amazon-vpc-cni-k8s/v1.15.3/config/master/aws-k8s-cni.yaml
patches:
  - patch: |
      kind: DaemonSet
      apiVersion: apps/v1
      metadata:
        name: aws-node
        namespace: kube-system
      spec:
        updateStrategy:
          type: RollingUpdate
          rollingUpdate:
            maxUnavailable: "25%"
        template:
          spec:
            tolerations:
              - operator: Exists
            containers:
              - name: aws-node
                livenessProbe:
                  timeoutSeconds: 20
                env:
                  - name: ENABLE_PREFIX_DELEGATION
                    value: "true"
                  - name: WARM_IP_TARGET
                    value: "0"
                  - name: MINIMUM_IP_TARGET
                    value: "16"
                  - name: AWS_VPC_K8S_CNI_LOGLEVEL
                    value: info
                  - name: AWS_VPC_K8S_CNI_LOG_FILE
                    value: stderr
                  - name: AWS_VPC_K8S_PLUGIN_LOG_LEVEL
                    value: info
                  - name: AWS_VPC_K8S_PLUGIN_LOG_FILE
                    value: stderr
                  - name: WARM_ENI_TARGET
                    value: "0"
                  - name: WARM_PREFIX_TARGET
                    value: "0"
                resources:
                  limits:
                    cpu: ~
                    memory: 256Mi
                  requests:
                    cpu: 100m
                    memory: 256Mi
              - name: aws-eks-nodeagent
                resources:
                  limits:
                    cpu: ~
                    memory: 256Mi
                  requests:
                    cpu: 100m
                    memory: 256Mi
  - patch: |
      apiVersion: v1
      kind: ServiceAccount
      metadata:
        name: aws-node
        namespace: kube-system
        annotations:
          eks.amazonaws.com/role-arn: arn:aws:iam::${account_id}:role/${cluster_name}-irsa-aws-vpc-cni
  - patch: |
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: amazon-vpc-cni
        namespace: kube-system
      data:
        enable-windows-ipam: "true"
        enable-windows-prefix-delegation: "true"
        minimum-ip-target: "8"
        warm-ip-target: "0"
