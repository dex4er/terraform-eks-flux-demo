## FluxCD application with the nodegroups created by Karpenter.

apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: nodegroups
  namespace: flux-system
spec:
  dependsOn:
    - name: infrastructure
  interval: 1m
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: /flux/nodegroups
  prune: true
  postBuild:
    substituteFrom:
      - kind: ConfigMap
        name: cluster-vars
