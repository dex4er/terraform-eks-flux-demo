apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: karpenter
  namespace: flux-system
spec:
  interval: 1m
  timeout: 2m
  maxHistory: 2
  releaseName: aws-load-balancer-controller
  targetNamespace: kube-system
  storageNamespace: kube-system
  serviceAccountName: helm-controller
  chart:
    spec:
      interval: 1m
      chart: karpenter
      version: v0.31.1 ## $ crane ls public.ecr.aws/karpenter/karpenter | sort -r -V | head -n1
      sourceRef:
        kind: HelmRepository
        name: karpenter
      reconcileStrategy: Revision
  install:
    crds: CreateReplace
  upgrade:
    crds: CreateReplace
  values:
    ## https://github.com/aws/karpenter/blob/main/charts/karpenter/values.yaml

    serviceAccount:
      annotations:
        eks.amazonaws.com/role-arn: arn:aws:iam::${account_id}:role/${cluster_name}-irsa-karpenter

    nodeSelector:
      nodegroup/initial: "true"

    settings:
      aws:
        clusterName: ${cluster_name}
        clusterEndpoint: ${cluster_endpoint}
        defaultInstanceProfile: ${cluster_name}-karpenter
        interruptionQueueName: ${cluster_name}-karpenter
        ## set `true`` for private VPC subnet (no access to AWS APIs)
        isolatedVPC: false
      featureGates:
        driftEnabled: true
