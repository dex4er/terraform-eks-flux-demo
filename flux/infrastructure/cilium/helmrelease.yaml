apiVersion: helm.toolkit.fluxcd.io/v2beta2
kind: HelmRelease
metadata:
  name: cilium
  namespace: flux-system
spec:
  interval: 1m
  timeout: 5m
  maxHistory: 2
  releaseName: cilium
  targetNamespace: kube-system
  storageNamespace: kube-system
  driftDetection:
    mode: enabled
  chart:
    spec:
      chart: cilium
      version: 1.15.1 ## $ curl -qsS https://helm.cilium.io/index.yaml | yq .entries.cilium.0.version
      sourceRef:
        kind: HelmRepository
        name: cilium
      reconcileStrategy: ChartVersion
  values:
    ## https://github.com/cilium/cilium/blob/main/install/kubernetes/cilium/values.yaml
    k8sServiceHost: ${cluster_endpoint_host}
    k8sServicePort: "443"
    ingressController:
      enabled: true
      default: true
    ipam:
      operator:
        clusterPoolIPv4PodCIDRList:
          - 10.252.0.0/16
    kubeProxyReplacement: "true"
